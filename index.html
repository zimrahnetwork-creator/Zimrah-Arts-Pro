<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Zimrah Arts Network</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Zimrah%20Arts%22,%22short_name%22:%22Zimrah%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22theme_color%22:%22#1e3a8a%22}">
    <script>
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch",e=>{e.respondWith(fetch(e.request));});');
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#f5f5f5}
        .header{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:white;padding:20px;text-align:center}
        .nav-tabs{display:flex;overflow-x:auto;background:#e2e8f0;padding:10px;gap:8px}
        .tab-btn{background:#1e3a8a;color:white;border:none;border-radius:40px;padding:10px 15px;cursor:pointer}
        .tab-btn.active{background:#d69e2e}
        .main-content{padding:16px}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .card{background:white;border-radius:20px;padding:15px;margin-bottom:15px}
        .btn{background:#1e3a8a;color:white;border:none;border-radius:40px;padding:12px;width:100%;cursor:pointer;margin-top:10px}
        .btn-gold{background:#d69e2e}
        .footer{background:#1e3a8a;color:white;text-align:center;padding:20px;margin-top:20px}
        input,textarea{width:100%;padding:10px;margin:8px 0;border-radius:20px;border:1px solid #ccc}
    </style>
</head>
<body>
<div class="app-container">
    <header class="header"><h1>ZIMRAH ARTS NETWORK</h1><p>Morogoro Mvomero</p></header>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('home')">Nyumbani</button>
        <button class="tab-btn" onclick="showTab('admin')">Admin</button>
    </div>
    <div class="main-content">
        <div id="home-tab" class="tab-content active">
            <div class="card"><h2>Karibu</h2><p>Injili kupitia sanaa.</p><button class="btn" onclick="alert('Tukio: Jumamosi Kanisa Kuu TAG')">Tukio</button></div>
            <div class="card"><div id="videos">Loading...</div></div>
        </div>
        <div id="admin-tab" class="tab-content">
            <div class="card">
                <input type="password" id="adminPwd" placeholder="Nenosiri la admin">
                <button class="btn btn-gold" onclick="loginAdmin()">Ingia</button>
                <div id="adminMsg"></div>
                <div id="adminPanel" style="display:none; margin-top:15px;">
                    <h3>Ongeza Video (YouTube)</h3>
                    <input type="text" id="title" placeholder="Kichwa">
                    <textarea id="desc" placeholder="Maelezo"></textarea>
                    <input type="url" id="url" placeholder="YouTube URL">
                    <button class="btn" onclick="addVideo()">Hifadhi</button>
                    <h3>Futa Video</h3>
                    <div id="deleteList"></div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">Created by Rev Frank R Kawonga</footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAyOCmGFxQ4iwB04GThPrV_HBbLO1rHH0I",
        authDomain: "zimrah-500.firebaseapp.com",
        databaseURL: "https://zimrah-500-default-rtdb.firebaseio.com",
        projectId: "zimrah-500",
        storageBucket: "zimrah-500.firebasestorage.app",
        messagingSenderId: "717447440964",
        appId: "1:717447440964:web:8c758ba34c5cad430b2a11"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false;

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(tab+'-tab').classList.add('active');
    }

    function loginAdmin() {
        let pwd = document.getElementById('adminPwd').value;
        // Password imefichwa: zimrah2025
        if(pwd === atob("emltcmFoMjAyNQ==")) {
            isAdmin = true;
            document.getElementById('adminMsg').innerHTML = '<p style="color:green">Umeingia kama admin</p>';
            document.getElementById('adminPanel').style.display = 'block';
            loadVideos(); loadDeleteList();
        } else {
            document.getElementById('adminMsg').innerHTML = '<p style="color:red">Nenosiri si sahihi</p>';
        }
    }

    function loadVideos() {
        db.ref('videos').once('value').then(snap => {
            let html = '';
            snap.forEach(c => {
                let v = c.val();
                html += `<div><b>${escapeHtml(v.title)}</b><br><a href="${v.url}" target="_blank">Tazama</a><hr></div>`;
            });
            document.getElementById('videos').innerHTML = html || 'Hakuna video';
        });
    }

    function loadDeleteList() {
        if(!isAdmin) return;
        db.ref('videos').once('value').then(snap => {
            let html = '';
            snap.forEach(c => {
                let v = c.val();
                html += `<div>${escapeHtml(v.title)} <button onclick="deleteVideo('${c.key}')">Futa</button></div>`;
            });
            document.getElementById('deleteList').innerHTML = html || 'Hakuna video';
        });
    }

    function addVideo() {
        if(!isAdmin) return alert('Ingia admin kwanza');
        let title = document.getElementById('title').value.trim();
        let desc = document.getElementById('desc').value.trim();
        let url = document.getElementById('url').value.trim();
        if(!title || !desc || !url) return alert('Jaza sehemu zote');
        db.ref('videos').push({title, description:desc, url, timestamp:Date.now()});
        alert('Video imeongezwa');
        document.getElementById('title').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('url').value = '';
        loadVideos();
        loadDeleteList();
    }

    function deleteVideo(id) {
        if(!isAdmin) return;
        if(confirm('Futa video hii?')) {
            db.ref('videos/'+id).remove();
            loadVideos();
            loadDeleteList();
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    loadVideos();
</script>
</body>
</html>
